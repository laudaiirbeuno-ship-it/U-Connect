    - assets/icon/anim/
    - assets/images/
    - assets/nepalicon/
    - assets/sensorsicon/
    - assets/appsicon/
    - assets/settingicon/
    - assets/speedoicon/
    - assets/rotatingicon/
    - assets/images/app_icon.png
